<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordle游戏辅助笔记工具</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="container">
        <!-- 公共分区 -->
        <div class="public-section">
            <!-- 综合状态区域 -->
            <div class="status-section">
                <h1>Wordle游戏辅助笔记工具</h1>
                <div class="status-bar">
                    <div class="current-status">
                        <label>当前状态：</label>
                        <div class="status-inputs" id="statusInputs"></div>
                    </div>
                    <div class="mode-switch">
                        <button id="modeToggle" class="btn">切换模式</button>
                        <span id="currentMode">猜词笔记模式</span>
                    </div>
                    <button id="resetBtn" class="btn btn-danger">重置</button>
                </div>
            </div>
            
            <!-- 配置区域 -->
            <div class="config-section">
                <h3>配置</h3>
                <div class="config-options">
                    <div class="config-item">
                        <label>答案单词长度：</label>
                        <input type="number" id="answerLength" min="4" max="10" value="5">
                    </div>
                    <div class="config-item">
                        <label>猜测单词最小长度：</label>
                        <input type="number" id="minGuessLength" min="4" max="10" value="4">
                    </div>
                    <div class="config-item">
                        <label>猜测单词最大长度：</label>
                        <input type="number" id="maxGuessLength" min="4" max="10" value="10">
                    </div>
                    <div class="config-item">
                        <label>颜色反馈配置：</label>
                        <select id="feedbackPreset">
                            <option value="DEFAULT">默认 (🟩 🟨 ⬜)</option>
                            <option value="CUSTOM">自定义 (● ○ ×)</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 中心功能区域 -->
        <div class="main-section">
            <!-- 出题人辅助判定模式 -->
            <div id="judgeMode" class="mode-section">
                <h2>出题人辅助判定模式</h2>
                
                <!-- 正确答案区域 -->
                <div class="answer-section">
                    <h3>正确答案</h3>
                    <div class="answer-input-group">
                        <input type="text" id="answerInput" placeholder="输入正确答案">
                        <button id="saveAnswerBtn" class="btn">保存答案</button>
                    </div>
                </div>
                
                <!-- 猜词判定区域 -->
                <div class="judge-section">
                    <h3>猜词判定</h3>
                    <div class="judge-input-group">
                        <input type="text" id="guessInput" placeholder="输入猜测单词">
                        <button id="judgeBtn" class="btn">判定</button>
                    </div>
                    <div class="judge-result">
                        <h4>判定结果</h4>
                        <div class="result-details" id="resultDetails"></div>
                        <div class="result-player" id="resultPlayer"></div>
                    </div>
                    <div class="history-section">
                        <h4>历史记录</h4>
                        <div class="history-list" id="historyList"></div>
                    </div>
                </div>
            </div>
            
            <!-- 猜词笔记模式 -->
            <div id="noteMode" class="mode-section active">
                <h2>猜词笔记模式</h2>
                
                <div class="note-content">
                    <!-- 猜词记录区域 -->
                    <div class="guesses-section">
                        <h3>猜词记录</h3>
                        <div class="guesses-list" id="guessesList"></div>
                        <div class="guess-input-section">
                            <input type="text" id="newGuessInput" placeholder="输入猜测单词">
                            <div class="count-selector">
                                <label id="correctLabel">🟩：</label>
                                <button class="count-btn" id="correctMinus">-</button>
                                <input type="number" id="correctCount" min="0" value="0">
                                <button class="count-btn" id="correctPlus">+</button>
                            </div>
                            <div class="count-selector">
                                <label id="presentLabel">🟨：</label>
                                <button class="count-btn" id="presentMinus">-</button>
                                <input type="number" id="presentCount" min="0" value="0">
                                <button class="count-btn" id="presentPlus">+</button>
                            </div>
                            <button id="addGuessBtn" class="btn">提交</button>
                        </div>
                    </div>
                    
                    <!-- 右侧面板 -->
                    <div class="right-panel">
                        <!-- 字母表状态展示面板 -->
                        <div class="letters-section">
                            <h3>字母状态</h3>
                            <div class="letters-container">
                                <div class="letter-card">
                                    <h4>必存在字母</h4>
                                    <div class="letter-list" id="existLetters"></div>
                                </div>
                                <div class="letter-card">
                                    <h4>可能存在字母</h4>
                                    <div class="letter-list" id="possibleLetters"></div>
                                </div>
                                <div class="letter-card">
                                    <h4>已排除字母</h4>
                                    <div class="letter-list" id="excludedLetters"></div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 候选词验证器 -->
                        <div class="validator-section">
                            <h3>候选词验证</h3>
                            <input type="text" id="validatorInput" placeholder="输入候选词">
                            <button id="validateBtn" class="btn">验证</button>
                            <div class="validation-result" id="validationResult"></div>
                        </div>
                        
                        <!-- 分享与导入 -->
                        <div class="share-section">
                            <h3>分享与导入</h3>
                            <textarea id="shareText" placeholder="粘贴分享文本或点击导出"></textarea>
                            <div class="share-buttons">
                                <button id="exportBtn" class="btn">导出</button>
                                <button id="importBtn" class="btn">导入</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 版本信息展示 -->
    <div class="version-info">
        <span class="version-item">版本: <span id="appVersion">{{APP_VERSION}}</span></span>
        <span class="version-item">提交: <span id="gitCommit">{{GIT_COMMIT}}</span></span>
        <span class="version-item">构建: <span id="buildTime">{{BUILD_TIME}}</span></span>
        <span class="version-item">分支: <span id="deployBranch">{{DEPLOY_BRANCH}}</span></span>
    </div>
    
    <script>
        (function() {
            var versionInfo = {
                appVersion: '{{APP_VERSION}}',
                gitCommit: '{{GIT_COMMIT}}',
                buildTime: '{{BUILD_TIME}}',
                deployBranch: '{{DEPLOY_BRANCH}}'
            };
            console.log('%c=== 版本溯源信息 ===', 'color: #4CAF50; font-weight: bold; font-size: 14px;');
            console.log('%c版本号: ', 'color: #2196F3;', versionInfo.appVersion);
            console.log('%cGit提交: ', 'color: #2196F3;', versionInfo.gitCommit);
            console.log('%c构建时间: ', 'color: #2196F3;', versionInfo.buildTime);
            console.log('%c部署分支: ', 'color: #2196F3;', versionInfo.deployBranch);
            console.log('%c========================', 'color: #4CAF50; font-weight: bold;');
        })();
    </script>
    
    <!-- 脚本加载 -->
    <script src="js/constants.js"></script>
    <script src="js/utils/storage.js"></script>
    <script src="js/utils/parser.js"></script>
    <script src="js/utils/validation.js"></script>
    <script src="js/components/status.js"></script>
    <script src="js/components/config.js"></script>
    <script src="js/components/guesses.js"></script>
    <script src="js/components/letters.js"></script>
    <script src="js/components/validator.js"></script>
    <script src="js/components/share.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
